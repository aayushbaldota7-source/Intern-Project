<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>OrderPulse – Real-Time Order Notification Demo</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{font-family:'Inter',sans-serif}
.mono{font-family:'JetBrains Mono',monospace}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#0f172a}
::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes glow-green{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.5)}50%{box-shadow:0 0 12px 4px rgba(34,197,94,.15)}}
@keyframes glow-yellow{0%,100%{box-shadow:0 0 0 0 rgba(234,179,8,.5)}50%{box-shadow:0 0 12px 4px rgba(234,179,8,.15)}}
@keyframes glow-red{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}50%{box-shadow:0 0 12px 4px rgba(239,68,68,.15)}}
.anim-insert{animation:slideIn .35s ease,glow-green 1.2s ease}
.anim-update{animation:slideIn .35s ease,glow-yellow 1.2s ease}
.anim-delete{animation:slideIn .35s ease,glow-red 1.2s ease}
.spin{animation:spin .7s linear infinite}
.tab-active{border-bottom:2px solid #818cf8;color:#a5b4fc}
</style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useCallback,useEffect}=React;

// ─── Data helpers ────────────────────────────────────────────────────────────
const NAMES=["Alice Chen","Bob Patel","Clara Nguyen","David Kim","Eva Rossi","Faisal Al-Amin","Grace Liu","Hiro Tanaka","Iris Müller","Jake Torres"];
const PRODUCTS=["Wireless Headphones","Standing Desk","Mechanical Keyboard","USB-C Hub","4K Monitor","Ergonomic Chair","Webcam Pro","LED Strip Kit","Smart Watch","Laptop Stand"];
const STATUSES=["pending","shipped","delivered"];
const STATUS_NEXT={pending:"shipped",shipped:"delivered",delivered:"pending"};
let _id=1000;
const uid=()=>++_id;
const ts=()=>new Date().toISOString();
const fmt=(iso)=>new Date(iso).toLocaleTimeString();
const randomFrom=(arr)=>arr[Math.floor(Math.random()*arr.length)];

function newOrder(){
  return{id:uid(),customer_name:randomFrom(NAMES),product_name:randomFrom(PRODUCTS),status:"pending",updated_at:ts()};
}

// ─── Claude API call ─────────────────────────────────────────────────────────
async function callClaude(apiKey,orders,action){
  const prompt=`You are a database change processor. Given the current orders array and an action, return ONLY valid JSON in this exact shape:
{"orders":[...],"summary":"One-sentence human-readable change description"}

Current orders (JSON): ${JSON.stringify(orders)}

Action to apply: ${JSON.stringify(action)}

Rules:
- For INSERT: add the new order object to the array.
- For UPDATE: find the order by id and change its status field and set updated_at to current ISO timestamp.
- For DELETE: remove the order with matching id.
- Return the complete updated orders array.
- summary must be one concise sentence.
Respond with ONLY the JSON object, no markdown, no explanation.`;

  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2048,messages:[{role:"user",content:prompt}]})
  });
  if(!res.ok){const e=await res.json();throw new Error(e.error?.message||"API error");}
  const data=await res.json();
  const text=data.content[0].text.trim();
  return JSON.parse(text.replace(/^```json\s*/,"").replace(/```\s*$/,""));
}

// ─── Status badge ────────────────────────────────────────────────────────────
function StatusBadge({s}){
  const cfg={pending:"bg-amber-900/50 text-amber-300 border border-amber-700",shipped:"bg-blue-900/50 text-blue-300 border border-blue-700",delivered:"bg-emerald-900/50 text-emerald-300 border border-emerald-700"};
  return<span className={`mono text-xs px-2 py-0.5 rounded-full ${cfg[s]||"bg-slate-700 text-slate-300"}`}>{s}</span>;
}

// ─── Event card ──────────────────────────────────────────────────────────────
function EventCard({ev}){
  const cfg={
    INSERT:{cls:"anim-insert border-l-4 border-emerald-500 bg-emerald-950/40",icon:"⬆",label:"INSERT",tc:"text-emerald-400"},
    UPDATE:{cls:"anim-update border-l-4 border-amber-500 bg-amber-950/40",icon:"✎",label:"UPDATE",tc:"text-amber-400"},
    DELETE:{cls:"anim-delete border-l-4 border-red-500 bg-red-950/40",icon:"✕",label:"DELETE",tc:"text-red-400"},
  }[ev.type]||{cls:"border-l-4 border-slate-500 bg-slate-800/40",icon:"•",label:ev.type,tc:"text-slate-400"};
  return(
    <div className={`rounded-lg p-3 mb-2 ${cfg.cls}`}>
      <div className="flex items-center justify-between mb-1">
        <span className={`text-xs font-bold ${cfg.tc} flex items-center gap-1`}>
          <span>{cfg.icon}</span><span>{cfg.label}</span>
        </span>
        <span className="mono text-xs text-slate-500">{fmt(ev.at)}</span>
      </div>
      <p className="text-sm text-slate-300">{ev.summary}</p>
      {ev.orderId&&<p className="mono text-xs text-slate-500 mt-1">order #{ev.orderId}</p>}
    </div>
  );
}

// ─── Architecture diagram ────────────────────────────────────────────────────
function ArchDiagram(){
  const nodes=[
    {label:"PostgreSQL DB",sub:"LISTEN/NOTIFY or WAL",color:"bg-violet-900/60 border-violet-600"},
    {label:"Change Detector",sub:"Debezium / pg_trigger",color:"bg-blue-900/60 border-blue-600"},
    {label:"Event Bus",sub:"Kafka / Redis Streams",color:"bg-cyan-900/60 border-cyan-600"},
    {label:"WS/SSE Server",sub:"Node.js / Go",color:"bg-indigo-900/60 border-indigo-600"},
    {label:"Client Browser",sub:"This panel →",color:"bg-emerald-900/60 border-emerald-600"},
  ];
  return(
    <div className="flex flex-wrap items-center gap-1 justify-center p-3 bg-slate-900/50 rounded-xl border border-slate-700/50 mt-3">
      {nodes.map((n,i)=>(
        <React.Fragment key={i}>
          <div className={`${n.color} border rounded-lg px-2 py-1 text-center min-w-[90px]`}>
            <div className="text-xs font-semibold text-slate-100">{n.label}</div>
            <div className="text-[10px] text-slate-400">{n.sub}</div>
          </div>
          {i<nodes.length-1&&<span className="text-slate-500 text-xs">→</span>}
        </React.Fragment>
      ))}
    </div>
  );
}

// ─── README tab ──────────────────────────────────────────────────────────────
function ReadmePanel(){
  return(
    <div className="text-sm text-slate-300 space-y-4 overflow-y-auto max-h-full pr-1">
      <section>
        <h2 className="text-base font-bold text-indigo-400 mb-1">Real-World Architecture</h2>
        <p className="text-slate-400">In production, real-time order notifications flow through a pipeline that avoids polling entirely. Here's how each piece fits together:</p>
      </section>
      <section>
        <h3 className="font-semibold text-slate-200 mb-1">1. PostgreSQL LISTEN/NOTIFY</h3>
        <p className="text-slate-400">PostgreSQL has a built-in pub/sub mechanism. A trigger fires on INSERT/UPDATE/DELETE and calls <code className="mono bg-slate-800 px-1 rounded text-xs">pg_notify('orders_channel', payload::text)</code>. A backend process uses <code className="mono bg-slate-800 px-1 rounded text-xs">LISTEN orders_channel</code> to receive these events asynchronously — no polling required.</p>
      </section>
      <section>
        <h3 className="font-semibold text-slate-200 mb-1">2. CDC with Debezium</h3>
        <p className="text-slate-400">For higher throughput, Debezium reads PostgreSQL's Write-Ahead Log (WAL) and publishes change events to Apache Kafka topics. This approach captures every row-level change with zero application code changes.</p>
      </section>
      <section>
        <h3 className="font-semibold text-slate-200 mb-1">3. WebSockets vs SSE</h3>
        <div className="overflow-x-auto">
          <table className="w-full text-xs border-collapse mt-1">
            <thead><tr className="text-slate-400"><th className="border border-slate-700 px-2 py-1 text-left">Feature</th><th className="border border-slate-700 px-2 py-1">WebSocket</th><th className="border border-slate-700 px-2 py-1">SSE</th></tr></thead>
            <tbody>
              {[["Direction","Bi-directional","Server→Client only"],["Protocol","WS (upgrade)","HTTP/1.1+"],["Reconnect","Manual","Automatic"],["Best for","Chat, games","Notifications, feeds"],["Load balancer","Sticky sessions needed","Works naturally"]].map(([f,w,s])=>(
                <tr key={f} className="text-slate-300"><td className="border border-slate-700 px-2 py-1 text-slate-400">{f}</td><td className="border border-slate-700 px-2 py-1 text-center">{w}</td><td className="border border-slate-700 px-2 py-1 text-center">{s}</td></tr>
              ))}
            </tbody>
          </table>
        </div>
      </section>
      <section>
        <h3 className="font-semibold text-slate-200 mb-1">Why No Polling?</h3>
        <ul className="list-disc list-inside text-slate-400 space-y-1 text-xs">
          <li>Polling wastes bandwidth and DB connections even when nothing changed</li>
          <li>Latency = poll interval (typically 1–30s); event-driven = sub-100ms</li>
          <li>At 10k clients polling every 5s = 2,000 req/s idle load; with SSE/WS it's near zero</li>
          <li>Database connection pool exhaustion is a real risk at scale with polling</li>
        </ul>
      </section>
      <section>
        <h3 className="font-semibold text-slate-200 mb-1">Scalability Considerations</h3>
        <ul className="list-disc list-inside text-slate-400 space-y-1 text-xs">
          <li><strong className="text-slate-300">Horizontal scaling:</strong> Use Redis Pub/Sub as a message bus between WS server instances so any instance can broadcast to all clients</li>
          <li><strong className="text-slate-300">Back-pressure:</strong> Kafka consumer groups let you scale consumers independently of producers</li>
          <li><strong className="text-slate-300">At-least-once delivery:</strong> Use idempotent event IDs and client-side dedup</li>
          <li><strong className="text-slate-300">Reconnection:</strong> SSE's Last-Event-ID header enables gap recovery after disconnect</li>
          <li><strong className="text-slate-300">Auth:</strong> JWT in WS handshake or SSE query param; validate per-connection</li>
        </ul>
      </section>
      <section>
        <h3 className="font-semibold text-slate-200 mb-1">This Demo's Simulation</h3>
        <p className="text-slate-400 text-xs">The left panel simulates the <strong className="text-slate-300">Admin / DB layer</strong>. Actions are sent to Claude (claude-sonnet-4-20250514) which acts as the "database" — returning updated state + a human-readable change summary. The right panel simulates the <strong className="text-slate-300">Client / WebSocket consumer</strong> receiving push events.</p>
      </section>
    </div>
  );
}

// ─── Orders table ────────────────────────────────────────────────────────────
function OrdersTable({orders}){
  if(!orders.length)return<p className="text-slate-500 text-sm text-center py-6">No orders yet.</p>;
  return(
    <div className="overflow-x-auto">
      <table className="w-full text-xs">
        <thead>
          <tr className="text-slate-400 border-b border-slate-700">
            {["ID","Customer","Product","Status","Updated"].map(h=><th key={h} className="text-left px-2 py-2 font-medium">{h}</th>)}
          </tr>
        </thead>
        <tbody>
          {orders.map(o=>(
            <tr key={o.id} className="border-b border-slate-800/60 hover:bg-slate-800/30 transition-colors db-row-enter">
              <td className="mono px-2 py-2 text-slate-500">#{o.id}</td>
              <td className="px-2 py-2 text-slate-200 font-medium">{o.customer_name}</td>
              <td className="px-2 py-2 text-slate-300">{o.product_name}</td>
              <td className="px-2 py-2"><StatusBadge s={o.status}/></td>
              <td className="mono px-2 py-2 text-slate-500">{fmt(o.updated_at)}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// ─── Main App ────────────────────────────────────────────────────────────────
function App(){
  const [apiKey,setApiKey]=useState(localStorage.getItem("op_apikey")||"");
  const [apiKeySaved,setApiKeySaved]=useState(!!localStorage.getItem("op_apikey"));
  const [orders,setOrders]=useState([]);
  const [events,setEvents]=useState([]);
  const [loading,setLoading]=useState(null); // "insert"|"update"|"delete"
  const [error,setError]=useState("");
  const [tab,setTab]=useState("live"); // "live"|"readme"
  const feedRef=useRef(null);

  useEffect(()=>{ if(feedRef.current)feedRef.current.scrollTop=0; },[events]);

  const saveKey=()=>{localStorage.setItem("op_apikey",apiKey);setApiKeySaved(true);};

  const pushEvent=(type,summary,orderId)=>{
    setEvents(prev=>[{id:Date.now(),type,summary,orderId,at:ts()},...prev].slice(0,50));
  };

  const doAction=useCallback(async(actionType)=>{
    if(!apiKeySaved&&!apiKey){setError("Please enter your Anthropic API key first.");return;}
    const key=apiKey;
    setError("");
    setLoading(actionType);
    try{
      let action;
      if(actionType==="INSERT"){
        const o=newOrder();
        action={type:"INSERT",order:o};
      }else if(actionType==="UPDATE"){
        if(!orders.length){setError("No orders to update.");setLoading(null);return;}
        const o=randomFrom(orders);
        action={type:"UPDATE",id:o.id,newStatus:STATUS_NEXT[o.status]||"pending"};
      }else{
        if(!orders.length){setError("No orders to delete.");setLoading(null);return;}
        const o=randomFrom(orders);
        action={type:"DELETE",id:o.id};
      }
      const result=await callClaude(key,orders,action);
      setOrders(result.orders||[]);
      pushEvent(actionType,result.summary,action.id||action.order?.id);
    }catch(e){
      setError(e.message||"Unknown error");
    }finally{
      setLoading(null);
    }
  },[apiKey,apiKeySaved,orders]);

  const btnCfg=[
    {type:"INSERT",label:"INSERT Order",icon:"＋",cls:"bg-emerald-600 hover:bg-emerald-500 shadow-emerald-900/50"},
    {type:"UPDATE",label:"UPDATE Status",icon:"✎",cls:"bg-amber-600 hover:bg-amber-500 shadow-amber-900/50"},
    {type:"DELETE",label:"DELETE Order",icon:"✕",cls:"bg-red-700 hover:bg-red-600 shadow-red-900/50"},
  ];

  return(
    <div className="flex flex-col h-screen overflow-hidden">
      {/* Header */}
      <header className="flex items-center justify-between px-6 py-3 bg-slate-900 border-b border-slate-800 shrink-0">
        <div className="flex items-center gap-3">
          <div className="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center text-white font-bold text-sm">OP</div>
          <div>
            <h1 className="font-bold text-slate-100 leading-none">OrderPulse</h1>
            <p className="text-xs text-slate-500">Real-Time Notification Demo</p>
          </div>
        </div>
        <div className="flex items-center gap-2">
          <input
            type="password"
            placeholder="sk-ant-... Anthropic API key"
            value={apiKey}
            onChange={e=>{setApiKey(e.target.value);setApiKeySaved(false);}}
            className="mono text-xs bg-slate-800 border border-slate-700 rounded-lg px-3 py-1.5 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-indigo-500 w-64"
          />
          <button
            onClick={saveKey}
            className="text-xs bg-indigo-600 hover:bg-indigo-500 px-3 py-1.5 rounded-lg font-medium transition-colors"
          >{apiKeySaved?"✓ Saved":"Save Key"}</button>
        </div>
      </header>

      {error&&(
        <div className="mx-4 mt-2 px-4 py-2 bg-red-950/60 border border-red-700 rounded-lg text-red-300 text-xs flex items-center justify-between shrink-0">
          <span>⚠ {error}</span>
          <button onClick={()=>setError("")} className="ml-3 text-red-400 hover:text-red-200">✕</button>
        </div>
      )}

      <div className="flex flex-1 overflow-hidden gap-0">
        {/* LEFT PANEL – Admin / DB */}
        <div className="w-[340px] shrink-0 flex flex-col bg-slate-900 border-r border-slate-800 overflow-y-auto scrollbar-thin">
          <div className="px-4 pt-4 pb-2">
            <div className="flex items-center gap-2 mb-1">
              <span className="w-2 h-2 rounded-full bg-violet-400 animate-pulse"/>
              <h2 className="font-semibold text-slate-100 text-sm">Admin / DB Panel</h2>
            </div>
            <p className="text-xs text-slate-500 mb-3">Simulates PostgreSQL + Claude as the change processor</p>

            <div className="space-y-2">
              {btnCfg.map(({type,label,icon,cls})=>(
                <button
                  key={type}
                  onClick={()=>doAction(type)}
                  disabled={!!loading}
                  className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-medium text-sm transition-all shadow-lg ${cls} disabled:opacity-40 disabled:cursor-not-allowed`}
                >
                  {loading===type
                    ? <span className="spin inline-block w-4 h-4 border-2 border-white/30 border-t-white rounded-full"/>
                    : <span className="text-base">{icon}</span>
                  }
                  {label}
                </button>
              ))}
            </div>
          </div>

          <div className="px-4 py-3 border-t border-slate-800 mt-2">
            <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Architecture Flow</p>
            <ArchDiagram/>
            <div className="mt-3 text-xs text-slate-500 space-y-1">
              <div className="flex items-center gap-2"><span className="w-2 h-2 rounded bg-violet-500 shrink-0"/><span>Left panel = DB + Change Detector</span></div>
              <div className="flex items-center gap-2"><span className="w-2 h-2 rounded bg-indigo-500 shrink-0"/><span>Claude API = Event Bus / Processor</span></div>
              <div className="flex items-center gap-2"><span className="w-2 h-2 rounded bg-emerald-500 shrink-0"/><span>Right panel = WS Client (live feed)</span></div>
            </div>
          </div>

          <div className="px-4 py-3 border-t border-slate-800">
            <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">In-Memory DB — <span className="text-indigo-400">{orders.length} orders</span></p>
            <div className="bg-slate-950/60 rounded-xl border border-slate-800 overflow-hidden">
              <OrdersTable orders={orders}/>
            </div>
          </div>
        </div>

        {/* RIGHT PANEL – Live Client Feed */}
        <div className="flex-1 flex flex-col overflow-hidden bg-slate-950">
          <div className="flex items-center border-b border-slate-800 px-4 shrink-0">
            {[{id:"live",label:"Live Client Feed"},{id:"readme",label:"README / Architecture"}].map(t=>(
              <button
                key={t.id}
                onClick={()=>setTab(t.id)}
                className={`px-4 py-3 text-sm font-medium transition-colors ${tab===t.id?"tab-active text-indigo-300":"text-slate-500 hover:text-slate-300"}`}
              >{t.label}</button>
            ))}
            <div className="ml-auto flex items-center gap-2 pr-2">
              <span className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"/>
              <span className="text-xs text-slate-500">WebSocket connected (simulated)</span>
            </div>
          </div>

          <div className="flex-1 overflow-y-auto scrollbar-thin p-4">
            {tab==="live"&&(
              <div className="flex flex-col gap-4">
                <div>
                  <div className="flex items-center gap-2 mb-3">
                    <h2 className="font-semibold text-slate-100 text-sm">Event Log</h2>
                    <span className="text-xs bg-slate-800 text-slate-400 px-2 py-0.5 rounded-full">{events.length} events</span>
                    {events.length>0&&<button onClick={()=>setEvents([])} className="text-xs text-slate-600 hover:text-slate-400 ml-auto">Clear</button>}
                  </div>
                  <div ref={feedRef}>
                    {events.length===0
                      ? <div className="text-center py-12 text-slate-600">
                          <div className="text-4xl mb-2">📡</div>
                          <p className="text-sm">Waiting for DB changes…</p>
                          <p className="text-xs mt-1">Use the Admin panel on the left to trigger events</p>
                        </div>
                      : events.map(ev=><EventCard key={ev.id} ev={ev}/>)
                    }
                  </div>
                </div>
                <div>
                  <div className="flex items-center gap-2 mb-3 border-t border-slate-800 pt-4">
                    <h2 className="font-semibold text-slate-100 text-sm">Live Orders Table</h2>
                    <span className="text-xs text-slate-500">(pushed via simulated WebSocket)</span>
                  </div>
                  <div className="bg-slate-900/60 rounded-xl border border-slate-800 overflow-hidden">
                    <OrdersTable orders={orders}/>
                  </div>
                </div>
              </div>
            )}
            {tab==="readme"&&<ReadmePanel/>}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
