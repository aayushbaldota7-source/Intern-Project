version: '3.9'

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: orderpulse_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-ordersdb}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      # Persist data across restarts
      - postgres_data:/var/lib/postgresql/data
      # Run migration SQL on first boot
      - ./backend/src/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-ordersdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - orderpulse_net

  # ── Backend (Node.js + Express + Socket.IO) ─────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orderpulse_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:    ${NODE_ENV:-production}
      PORT:        ${PORT:-3000}
      LOG_LEVEL:   ${LOG_LEVEL:-info}
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     ${DB_NAME:-ordersdb}
      DB_USER:     ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    ports:
      - "${PORT:-3000}:3000"
    networks:
      - orderpulse_net

volumes:
  postgres_data:

networks:
  orderpulse_net:
    driver: bridge
